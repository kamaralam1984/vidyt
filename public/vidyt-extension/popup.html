<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 250px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #0f0f0f;
      color: white;
      text-align: center;
    }
    .logo {
      width: 48px;
      margin-bottom: 12px;
    }
    h2 {
      font-size: 18px;
      margin: 0 0 8px 0;
      color: #ff0000;
    }
    p {
      font-size: 14px;
      color: #aaa;
      margin-bottom: 16px;
    }
    .btn {
      display: inline-block;
      width: 100%;
      padding: 10px;
      background: #ff0000;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <img src="icon.png" class="logo" />
  <h2>Vid YT Helper</h2>
  <p>Optimizing your YouTube experience in real-time.</p>
  <a href="https://vidyt.com/dashboard" target="_blank" class="btn">Open Dashboard</a>
</body>
</html>
