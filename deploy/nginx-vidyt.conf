# ============================================================
# VidYT – Production NGINX Configuration
# Architecture: Cloudflare → NGINX (port 80) → PM2/Next.js (:3000)
# SSL is terminated at Cloudflare (Full Strict mode)
# ============================================================

# ── WebSocket connection upgrade map ────────────────────────
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ── Restore real visitor IP from Cloudflare ─────────────────
# Without this, $remote_addr is Cloudflare's IP (not visitor's)
# Full IPv4+IPv6 list: https://www.cloudflare.com/ips/
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 131.0.72.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
# IPv6
set_real_ip_from 2400:cb00::/32;
set_real_ip_from 2606:4700::/32;
set_real_ip_from 2803:f800::/32;
set_real_ip_from 2405:b500::/32;
set_real_ip_from 2405:8100::/32;
set_real_ip_from 2a06:98c0::/29;
set_real_ip_from 2c0f:f248::/32;
# Use CF-Connecting-IP (real visitor IP sent by Cloudflare)
real_ip_header CF-Connecting-IP;

# ── Block direct IP access — must pass through Cloudflare ───
# Prevents bypassing WAF, DDoS protection, and bot rules
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    return 444;   # No response — drops connection silently
}

# ── Main site server block ────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name www.vidyt.com vidyt.com;
    server_tokens off;

    # ── Block AI crawlers and bad bots by User-Agent ─────────
    # Cloudflare Bot Fight Mode covers most, this is a secondary layer
    if ($http_user_agent ~* "(semrushbot|ahrefsbot|dotbot|mj12bot|baiduspider|yandexbot|petalbot|sogou|exabot|ia_archiver|python-requests|go-http-client|scrapy|libwww-perl|masscan|zgrab|sqlmap|nikto|nessus|openvas|nuclei)") {
        return 403;
    }

    # ── Block hidden files and directories ───────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── Block sensitive file extensions ──────────────────────
    location ~* \.(env|git|sql|bak|log|sh|conf|key|pem|crt)$ {
        deny all;
        return 404;
    }

    # ── Health endpoints — public but rate-limited ────────────
    # 5 req/s with burst=10, nodelay = fast legitimate checks allowed
    # protects against bot polling loops
    location /api/health {
        limit_req  zone=health_limit burst=10 nodelay;
        limit_conn conn_limit 5;

        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header CF-Connecting-IP  $http_cf_connecting_ip;
        proxy_set_header CF-IPCountry      $http_cf_ipcountry;
        proxy_set_header CF-Ray            $http_cf_ray;

        add_header Cache-Control    "no-store" always;
        add_header X-Robots-Tag     "noindex, nofollow" always;
        proxy_hide_header X-Powered-By;
    }

    # ── Auth endpoints — strictest rate limit (1 req/s, burst 3) ─
    location /api/auth/ {
        limit_req  zone=auth_limit burst=3 nodelay;
        limit_conn conn_limit 5;

        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header CF-Connecting-IP  $http_cf_connecting_ip;
        proxy_set_header CF-IPCountry      $http_cf_ipcountry;
        proxy_set_header CF-Ray            $http_cf_ray;

        add_header Cache-Control                  "no-store" always;
        add_header CDN-Cache-Control              "no-store" always;
        add_header Cloudflare-CDN-Cache-Control   "no-store" always;
        proxy_cache_bypass 1;
        proxy_no_cache     1;
        proxy_hide_header X-Powered-By;
        proxy_hide_header Server;
    }

    # ── All API routes — general rate limit ──────────────────
    # 10 req/s sustained, burst of 20 allowed without delay
    location /api/ {
        limit_req  zone=api_limit burst=20 nodelay;
        limit_conn conn_limit 10;

        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header CF-Connecting-IP  $http_cf_connecting_ip;
        proxy_set_header CF-IPCountry      $http_cf_ipcountry;
        proxy_set_header CF-Ray            $http_cf_ray;

        add_header Cache-Control                  "no-store, no-cache, must-revalidate" always;
        add_header CDN-Cache-Control              "no-store" always;
        add_header Cloudflare-CDN-Cache-Control   "no-store" always;
        add_header X-Cache-Status                 "BYPASS" always;
        proxy_cache_bypass 1;
        proxy_no_cache     1;

        proxy_connect_timeout 30s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
        proxy_buffer_size     16k;
        proxy_buffers         8 16k;

        proxy_hide_header X-Powered-By;
        proxy_hide_header Server;
    }

    # ── Next.js static assets — immutable, Cloudflare caches ─
    # Content-hashed filenames, safe to cache for 1 year
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header CF-Connecting-IP  $http_cf_connecting_ip;
        proxy_set_header CF-IPCountry      $http_cf_ipcountry;
        proxy_set_header CF-Ray            $http_cf_ray;

        # Immutable: Cloudflare will cache these; content hash guarantees freshness
        add_header Cache-Control  "public, max-age=31536000, immutable, no-transform" always;
        add_header X-Cache-Status "STATIC" always;
    }

    # ── All page routes ───────────────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header CF-Connecting-IP  $http_cf_connecting_ip;
        proxy_set_header CF-IPCountry      $http_cf_ipcountry;
        proxy_set_header CF-Ray            $http_cf_ray;

        proxy_cache_bypass 1;
        proxy_no_cache     1;
        add_header X-Cache-Status "BYPASS" always;

        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
        proxy_buffer_size     8k;
        proxy_buffers         8 8k;

        proxy_hide_header X-Powered-By;
        proxy_hide_header Server;
    }
}
