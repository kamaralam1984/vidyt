version: '3.9'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0-alpine
    container_name: viralboost-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-rootpassword}
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE:-viralboost}
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - viralboost-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    security_opt:
      - no-new-privileges:true

  # Redis Cache & Queue
  redis:
    image: redis:7-alpine
    container_name: viralboost-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispassword} --appendonly yes --maxmemory ${REDIS_MAX_MEMORY:-512mb} --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - viralboost-network
    healthcheck:
      test: redis-cli -a ${REDIS_PASSWORD:-redispassword} ping || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    security_opt:
      - no-new-privileges:true

  # Backend API Server
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: viralboost-backend
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 5000
      MONGODB_URI: mongodb://${MONGO_ROOT_USER:-root}:${MONGO_ROOT_PASSWORD:-rootpassword}@mongodb:27017/${MONGO_DATABASE:-viralboost}?authSource=admin
      REDIS_URL: redis://:${REDIS_PASSWORD:-redispassword}@redis:6379
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      OTP_EXPIRY: ${OTP_EXPIRY:-300}
      YOUTUBE_CLIENT_ID: ${YOUTUBE_CLIENT_ID}
      YOUTUBE_CLIENT_SECRET: ${YOUTUBE_CLIENT_SECRET}
      YOUTUBE_CALLBACK_URL: ${YOUTUBE_CALLBACK_URL:-http://localhost:5000/api/youtube/callback}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY}
      SENDGRID_FROM_EMAIL: ${SENDGRID_FROM_EMAIL}
      AI_SERVICE_URL: http://ai-service:5001
      WORKER_SERVICE_URL: http://worker:5002
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - viralboost-network
    healthcheck:
      test: curl -f http://localhost:5000/api/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"

  # AI Service (Python)
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: viralboost-ai-service
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "5001:5001"
    environment:
      FLASK_ENV: ${NODE_ENV:-production}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redispassword}@redis:6379
      BACKEND_URL: http://backend:5000
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - ./ai-service:/app
      - /app/__pycache__
    networks:
      - viralboost-network
    healthcheck:
      test: curl -f http://localhost:5001/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"

  # Worker Service (BullMQ Queue Workers)
  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: viralboost-worker
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    ports:
      - "5002:5002"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redispassword}@redis:6379
      MONGODB_URI: mongodb://${MONGO_ROOT_USER:-root}:${MONGO_ROOT_PASSWORD:-rootpassword}@mongodb:27017/${MONGO_DATABASE:-viralboost}?authSource=admin
      BACKEND_URL: http://backend:5000
      AI_SERVICE_URL: http://ai-service:5001
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-4}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - ./worker:/app
      - /app/node_modules
      - worker_logs:/app/logs
    networks:
      - viralboost-network
    healthcheck:
      test: curl -f http://localhost:5002/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"

  # Additional Worker Instances (for scaling)
  worker-2:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: viralboost-worker-2
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redispassword}@redis:6379
      MONGODB_URI: mongodb://${MONGO_ROOT_USER:-root}:${MONGO_ROOT_PASSWORD:-rootpassword}@mongodb:27017/${MONGO_DATABASE:-viralboost}?authSource=admin
      BACKEND_URL: http://backend:5000
      AI_SERVICE_URL: http://ai-service:5001
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-4}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      WORKER_NAME: worker-2
    volumes:
      - ./worker:/app
      - /app/node_modules
      - worker_logs:/app/logs
    networks:
      - viralboost-network
    healthcheck:
      test: curl -f http://localhost:5002/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"

  # Frontend (Next.js)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost/api}
        - NEXT_PUBLIC_BACKEND_URL=${NEXT_PUBLIC_BACKEND_URL:-http://localhost}
    container_name: viralboost-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost/api}
      NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:-http://localhost}
      NEXT_PUBLIC_YOUTUBE_CLIENT_ID: ${YOUTUBE_CLIENT_ID}
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    networks:
      - viralboost-network
    healthcheck:
      test: curl -f http://localhost:3000/ || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"

  # NGINX Reverse Proxy
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: viralboost-nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
      - ai-service
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_cache:/var/cache/nginx
    networks:
      - viralboost-network
    healthcheck:
      test: wget --quiet --tries=1 --spider http://localhost/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"

# ============================================
# Networks
# ============================================
networks:
  viralboost-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# ============================================
# Volumes
# ============================================
volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
  redis_data:
    driver: local
  worker_logs:
    driver: local
  nginx_cache:
    driver: local
